<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Foot Analysis V4 - Local Diagnostic Sandbox</title>
    <style>
        body { margin: 0; overflow: hidden; background: #0a0a0c; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; touch-action: none; }
        #ui-layer { display: none !important; }
        
        /* Interactive Testing HUD overlay */
        #diagnostic-hud {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(20, 20, 24, 0.88);
            border: 1px solid rgba(0, 212, 255, 0.2);
            border-radius: 16px;
            padding: 16px;
            width: 320px;
            z-index: 100;
            color: #fff;
            pointer-events: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .hud-title { font-size: 11px; font-weight: 700; color: #00D4FF; letter-spacing: 1px; text-transform: uppercase; margin: 0 0 4px 0; }
        .hud-value { font-size: 20px; font-weight: 800; color: #fff; margin: 0 0 12px 0; }
        .data-label { font-size: 11px; font-weight: 600; color: #888; text-transform: uppercase; margin: 8px 0 2px 0; }
        .data-value { font-size: 13px; color: #e5e5ea; background: rgba(255,255,255,0.04); padding: 6px 10px; border-radius: 8px; font-family: monospace; overflow-x: auto; white-space: nowrap; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.03); }
        #pathology-list { font-size: 13px; color: #ff4d4d; padding-left: 18px; margin: 4px 0 0 0; }
        #mode-indicator { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.12); padding: 8px 18px; border-radius: 20px; color: #fff; font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; z-index: 100; pointer-events: none; }
        .mode-btn { background: #00D4FF; border: none; color: #000; font-weight: 700; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 12px; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
    </style>
</head>
<body>

<div id="diagnostic-hud">
    <p class="data-label">Selected Layer Tracking</p>
    <div id="target-structure" style="font-size:16px; font-weight:700; color:#fff; margin-bottom:4px;">No Structure Selected</div>
    <div id="target-type" style="font-size:11px; font-weight:700; color:#34c759; text-transform:uppercase;">READY</div>
    
    <p class="data-label">Raw Captured Vector</p>
    <div id="vector-output" class="data-value">X: 0.000, Y: 0.000, Z: 0.000</div>
    
    <p class="data-label">Nearest Proximity Margin</p>
    <div id="proximity-output" class="data-value">0.00 units</div>

    <p class="data-label">Database Mapped Pathologies</p>
    <ul id="pathology-list">
        <li>Tap the foot mesh to query properties</li>
    </ul>

    <button id="toggle-mode-btn" class="mode-btn">SWITCH TO MARK MODE</button>
</div>

<div id="mode-indicator">Mode: Rotate View</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

const urls = {
    left: "https://stuart-mcneill.github.io/3Dfootselection/Leftfoot.glb",
    right: "https://stuart-mcneill.github.io/feet-selection/RightFoot.glb"

let scene, camera, renderer, controls;

let mouse = new THREE.Vector2();

function init() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a0c);
    camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 100);
    
    renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    document.body.appendChild(renderer.domElement);

    controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.05;

    scene.add(new THREE.HemisphereLight(0xffffff, 0x222222, 3.0));
    const sun = new THREE.DirectionalLight(0xffffff, 2.0);
    sun.position.set(5, 5, 5);
    scene.add(sun);

    scene.add(footGroup);
    scene.add(markerGroup);

    // Dynamic UI Hook setup
    document.getElementById('toggle-mode-btn').addEventListener('click', toggleInteractionMode);

    const handleInput = (e) => {
        if (!isLoaded || mode !== "mark") return;
        if (e.type === 'touchstart') e.preventDefault();

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;

        const rect = renderer.domElement.getBoundingClientRect();
        mouse.x = ((clientX - rect.left) / rect.width) * 2 - 1;
        mouse.y = -((clientY - rect.top) / rect.height) * 2 + 1;
        
        performRaycast();
    };

    renderer.domElement.addEventListener("mousedown", (e) => { if(!('ontouchstart' in window)) handleInput(e); });
    renderer.domElement.addEventListener("touchstart", handleInput, { passive: false });
    
    window.addEventListener("resize", onResize);
    loadFoot();
    animate();
}

/**
 * Geometric Nearest Neighbor Distance Calculation Engine
 */
function findClosestAnatomy(tapPoint, maxDistanceThreshold = 0.06) {
    let closestStructure = null;
    let minDistance = Infinity;

    const db = ANATOMY_TRACER_DATABASE.anatomical_database;
    
    for (let i = 0; i < db.length; i++) {
        const structure = db[i];
        
        for (let j = 0; j < structure.coordinates.length; j++) {
            const coord = structure.coordinates[j];
            
            // Standard Euclidean Distance Math Formula
            const distance = Math.sqrt(
                Math.pow(tapPoint.x - coord[0], 2) +
                Math.pow(tapPoint.y - coord[1], 2) +
                Math.pow(tapPoint.z - coord[2], 2)
            );

            if (distance < minDistance) {
                minDistance = distance;
                closestStructure = structure;
            }
        }
    }

    if (minDistance <= maxDistanceThreshold) {
        return { structure: closestStructure, distance: minDistance };
    }
    return null;
}

function performRaycast() {
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(footGroup.children, true);
    
    if (hits.length > 0) {
        const pos = hits[0].point;

        // Render point marker on mesh canvas surface
        const dot = new THREE.Mesh(
            new THREE.SphereGeometry(0.008), 
            new THREE.MeshBasicMaterial({ color: 0x00D4FF })
        );
        dot.position.copy(pos);
        markerGroup.add(dot);

        // Update UI HUD text fields with raw vector coordinates
        document.getElementById('vector-output').innerText = 
            `X: ${pos.x.toFixed(4)}, Y: ${pos.y.toFixed(4)}, Z: ${pos.z.toFixed(4)}`;

        // Execute Nearest Neighbor Match Algorithm
        const match = findClosestAnatomy(pos, 0.06);

        if (match) {
            document.getElementById('target-structure').innerText = match.structure.label;
            document.getElementById('target-type').innerText = match.structure.type;
            document.getElementById('proximity-output').innerText = `${(match.distance * 100).toFixed(2)} units`;
            
            // Update pathology rendering listing
            const listContainer = document.getElementById('pathology-list');
            listContainer.innerHTML = "";
            match.structure.clinical_profile.pathologies.forEach(path => {
                const li = document.createElement('li');
                li.innerText = path;
                listContainer.appendChild(li);
            });
        } else {
            document.getElementById('target-structure').innerText = "Nonspecific Surface Layer";
            document.getElementById('target-type').innerText = "Surface";
            document.getElementById('proximity-output').innerText = "Outside threshold range";
            document.getElementById('pathology-list').innerHTML = "<li>No deep structural matches found near this tap zone.</li>";
        }
        
        // Pass payload updates seamlessly back if connected inside Expo native application environments
        if (window.ReactNativeWebView) {
            window.ReactNativeWebView.postMessage(JSON.stringify({
                count: markerGroup.children.length,
                region: match ? match.structure.label : "External Surface",
                lastCoordinates: [pos.x, pos.y, pos.z]
            }));
        }
    }
}

function loadFoot() {
    isLoaded = false;
    footGroup.clear();
    markerGroup.clear();

    new GLTFLoader().load(urls[currentFoot], (gltf) => {
        const model = gltf.scene;
        model.traverse(c => { 
            if(c.isMesh) {
                c.material = new THREE.MeshStandardMaterial({ 
                    color: 0x222226, roughness: 0.5, metalness: 0.1 
                }); 
            }
        });
        
        const box = new THREE.Box3().setFromObject(model);
        const size = new THREE.Vector3();
        box.getSize(size);
        const center = new THREE.Vector3();
        box.getCenter(center);

        model.position.x = -center.x;
        model.position.y = -box.min.y; 
        model.position.z = -center.z;

        const maxDim = Math.max(size.x, size.y, size.z);
        const scaleFactor = 1.0 / maxDim;
        model.scale.setScalar(scaleFactor);
        model.position.multiplyScalar(scaleFactor);

        footGroup.add(model);
        camera.position.set(0, 1.2, 2.5);
        controls.target.set(0, 0.4, 0);
        isLoaded = true;
    });
}

function toggleInteractionMode() {
    if (mode === "rotate") {
        mode = "mark";
        controls.enabled = false;
        document.getElementById('mode-indicator').innerText = "Mode: Mark Spot";
        document.getElementById('toggle-mode-btn').innerText = "SWITCH TO VIEW MODE";
        document.getElementById('toggle-mode-btn').style.background = "#ff4d4d";
    } else {
        mode = "rotate";
        controls.enabled = true;
        document.getElementById('mode-indicator').innerText = "Mode: Rotate View";
        document.getElementById('toggle-mode-btn').innerText = "SWITCH TO MARK MODE";
        document.getElementById('toggle-mode-btn').style.background = "#00D4FF";
    }
}

// --- EXPO EXTERNAL CONTROLLER OVERRIDES ---
window.handleMobileCommand = (json) => {
    const data = JSON.parse(json);
    if (data.action === 'SELECT') { currentFoot = data.side; loadFoot(); }
    if (data.action === 'SET_MODE') {
        mode = data.mode;
        controls.enabled = (mode === "rotate");
        document.getElementById('mode-indicator').innerText = mode === "rotate" ? "Mode: Rotate View" : "Mode: Mark Spot";
    }
    if (data.action === 'UNDO') {
        if (markerGroup.children.length > 0) {
            markerGroup.remove(markerGroup.children[markerGroup.children.length - 1]);
        }
    }
    if (data.action === 'CLEAR') {
        markerGroup.clear();
    }
};

function onResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
</script>
</body>
